<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Smart-Aptiv] E-AHP DX Portal Platform</title>
    <style>
        /* 1. 디자인 시스템 초기화 및 다크 테마 고유 스펙 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; }
        body { background-color: #070a13; color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; overflow-x: hidden; }
        
        /* 주황색 테크노 그물망 배경 레이어 */
        .grid-bg { 
            position: fixed; inset: 0; 
            background-image: radial-gradient(#ff5500 0.5px, transparent 0.5px); 
            background-size: 35px 35px; opacity: 0.12; pointer-events: none; z-index: 0;
        }

        /* 2. 상단 헤더 영역 */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background-color: #0f1422; border-bottom: 1px solid #1e293b; position: relative; z-index: 10;
        }
        .brand-logo { color: #ff3b30; font-size: 24px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 12px rgba(255,59,48,0.4); }
        .slogan { font-size: 13px; font-weight: bold; color: #94a3b8; display: none; } /* 모바일에서는 숨김 처리하여 공간 확보 */
        .status-badge { background-color: #ff3b30; color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; letter-spacing: 1px; display: inline-block; }

        /* 3. 메인 레이아웃 구역 */
        .main-container { display: flex; flex-direction: column; flex: 1; position: relative; z-index: 5; }

        /* [메뉴 서랍 / 모바일 버전: 상단 가로 스크롤 바] */
        aside {
            width: 100%; background: rgba(17, 24, 39, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 12px 15px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 9;
        }
        
        /* 모바일 터치 전용 가로 스크롤 메뉴 리스트 */
        .menu-list { 
            display: flex; flex-direction: row; gap: 8px; 
            overflow-x: auto; overflow-y: hidden; white-space: nowrap; padding-bottom: 5px; 
            width: 100%; -webkit-overflow-scrolling: touch;
        }
        .menu-list::-webkit-scrollbar { height: 4px; }
        .menu-list::-webkit-scrollbar-thumb { background: #ff3b30; border-radius: 10px; }
        
        .menu-btn {
            background-color: rgba(20, 27, 45, 0.7); border: 1px solid rgba(255,255,255,0.05);
            color: #94a3b8; padding: 8px 14px; border-radius: 20px; text-align: center;
            font-size: 12px; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px;
            flex-shrink: 0;
        }
        .menu-btn:hover { border-color: #38bdf8; color: white; }
        .menu-btn.active {
            background: linear-gradient(90deg, #ff3b30 0%, #dd2c22 100%);
            color: white; border-color: #ff3b30; font-weight: bold;
            box-shadow: 0 4px 12px rgba(255, 59, 48, 0.3);
        }

        /* 4. 컨텐츠 배치 시스템 (모바일에서는 세로로 순차 배치) */
        main { flex: 1; padding: 20px; display: flex; flex-direction: column; position: relative; gap: 20px; }
        
        /* [데이터 보드판] */
        .info-board {
            width: 100%; display: flex; flex-direction: column; justify-content: flex-start;
            background: rgba(11, 15, 25, 0.85); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 20px; backdrop-filter: blur(10px);
        }
        .info-header span { font-size: 10px; font-weight: bold; color: #ff3b30; letter-spacing: 1px; text-transform: uppercase; }
        .info-header h3 { font-size: 18px; font-weight: 900; color: white; margin-top: 5px; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; white-space: normal; word-break: keep-all; }
        .info-body { margin-top: 15px; font-size: 13.5px; color: #94a3b8; line-height: 1.6; }
        
        /* 보고서 전용 리스트 템플릿 */
        .info-body ul { list-style: none; margin-top: 5px; }
        .info-body li { margin-bottom: 12px; position: relative; padding-left: 18px; color: #e2e8f0; white-space: normal; word-break: keep-all; }
        .info-body li::before { content: "■"; position: absolute; left: 0; color: #38bdf8; font-size: 8px; top: 3px; }
        .info-body b { color: #38bdf8; }

        /* [우측 배치였던 프레임 -> 모바일 하단 배치] */
        .content-frame {
            width: 100%; background: rgba(15, 20, 34, 0.4); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); padding: 15px;
        }
        .content-frame img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; transition: all 0.5s ease; }
        
        /* 프레임 내부 하단 핵심 요약 영역 */
        .center-summary {
            width: 100%; margin-top: 12px; padding: 10px 15px; background: rgba(7, 10, 19, 0.6); 
            border: 1px dashed rgba(56, 189, 248, 0.3); border-radius: 10px; text-align: center;
        }
        .center-summary p { font-size: 12px; color: #38bdf8; font-weight: bold; letter-spacing: 0.5px; word-break: keep-all; }
        
        /* 라이브 노드 펄스 배지 */
        .live-badge {
            position: absolute; top: 10px; left: 10px; display: flex; align-items: center; gap: 6px;
            background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .pulse-dot { width: 6px; height: 6px; background-color: #10b981; border-radius: 50%; animation: pulse 2s infinite; }

        /* 5. 하단 버튼 바 */
        footer {
            padding: 15px 20px; background-color: #0f1422; border-top: 1px solid #1e293b;
            display: flex; flex-direction: column; gap: 10px; justify-content: center; align-items: center; position: relative; z-index: 10;
        }
        .fav-group { display: flex; gap: 6px; width: 100%; justify-content: center; overflow-x: auto; }
        .fav-btn {
            background-color: #141b2d; border: 1px solid #1e293b; color: #64748b;
            padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; flex-shrink: 0;
        }
        .fav-btn:hover { color: white; background-color: #1f293d; }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        /* 6. 태블릿 및 데스크톱 스크린 대응용 미디어 쿼리 (화면이 넓어지면 HUD 스타일로 복원) */
        @media (min-width: 992px) {
            body { height: 100vh; overflow: hidden; flex-direction: column; }
            header { padding: 15px 40px; }
            .brand-logo { font-size: 28px; }
            .slogan { display: block; }
            
            .main-container { flex-direction: row; overflow: hidden; }
            aside { width: 380px; height: 100%; border-radius: 0 450px 450px 0; border-right: 1px solid rgba(255,255,255,0.08); border-bottom: none; padding: 50px 35px; position: relative; }
            .menu-list { flex-direction: column; gap: 7px; overflow-y: auto; overflow-x: hidden; white-space: normal; max-height: 85vh; }
            .menu-btn { width: 100%; text-align: left; font-size: 13px; padding: 12px 16px; border-radius: 14px; }
            
            main { flex: 1; padding: 40px; flex-direction: row; gap: 30px; overflow: hidden; }
            .info-board { flex: 1.1; padding: 40px; height: 100%; }
            .info-header h3 { font-size: 24px; }
            .info-body { flex: 1; overflow-y: auto; }
            .content-frame { flex: 0.9; height: 100%; padding: 20px; }
            .content-frame img { max-width: 95%; max-height: 75%; }
            .center-summary p { font-size: 13px; }
            
            footer { flex-direction: row; justify-content: space-between; padding: 15px 40px; }
            .fav-group { width: auto; }
        }
    </style>
</head>

        function switchSlide(slideNumber) {
            const buttons = document.querySelectorAll('.menu-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttons[slideNumber - 1].classList.add('active');

            const data = slideDatabase[slideNumber];

            document.getElementById('center-summary-text').innerText = data.summary;
            document.getElementById('slide-category').innerText = data.category;
            document.getElementById('slide-title').innerText = data.title;
            document.getElementById('slide-content').innerHTML = data.content;
            document.getElementById('live-node-text').innerText = data.badge;

            // 터치한 메뉴 버튼이 가로 스크롤바 밖으로 잘리지 않도록 자동 스크롤 포커싱
            const activeBtn = buttons[slideNumber - 1];
            const container = document.getElementById('mobile-scroll-container');
            if(window.innerWidth < 992) {
                container.scrollTo({
                    left: activeBtn.offsetLeft - 20,
                    behavior: 'smooth'
                });
            }

            const img = document.getElementById('equipment-image');
            img.style.transform = 'scale(0.97)';
            setTimeout(() => {
                img.style.transform = 'scale(1)';
            }, 120);
        }

        window.onload = function() {
            switchSlide(1);
        };
    </script>
